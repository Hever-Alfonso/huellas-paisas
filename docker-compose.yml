services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huellas-paisas-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - DATABASE_URL=sqlite:////app/data/huellas_paisas.db
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    command: >
      uvicorn src.infrastructure.api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped
    networks:
      - huellas-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  huellas-network:
    driver: bridge
